<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="bg-image"></div>
    <main>
        <div class="login-box">
            <div style="display:flex; align-items: center;font-size: 20px; font-weight: bold;"><span class="material-symbols-outlined" style="margin-right: 10px;font-size: 30px;color: #005fb8;">blood_pressure</span> Medi-Planner 護理排班系統</div>
            <div style="display:flex; align-items: center;font-size: 20px; font-weight: bold;">Sign In</div>
            <div class="account">
            <div style="font-weight: bold;">帳號</div>
            <input placeholder="請輸入員工編號">
            </div>
            <div class="password">
            <div style="font-weight: bold;">密碼</div>
            <input type="password" placeholder="請輸入密碼">
            </div>
            <div class="hint"></div>
            <div>測試帳號:123 測試密碼:123</div>
            <button class="login-btn" onclick="login()">登入</button>
            <hr>
            <div style="display:flex; align-items: center;justify-content: center; font-weight: bold;">還沒有帳戶 ?<div style="margin-left:10px;color: #005FB8; cursor: pointer;" class="signupbtn" onclick="showsignup()">點此註冊</div></div>
        </div>
        <div class="signup-box is-hidden">
            <div style="display:flex; align-items: center;font-size: 20px; font-weight: bold;"><span class="material-symbols-outlined" style="margin-right: 10px;font-size: 30px;color: #005fb8;">blood_pressure</span> Medi-Planner 護理排班系統</div>
            <div style="display:flex; align-items: center;font-size: 20px; font-weight: bold;">Sign Up</div>
            <div class="signup-name">
            <div style="font-weight: bold;">姓名</div>
            <input placeholder="請輸入姓名">
            </div>
            <div class="signup-account">
            <div style="font-weight: bold;">帳號</div>
            <input placeholder="請輸入員工編號">
            </div>
            <div class="signup-password">
            <div style="font-weight: bold;">密碼</div>
            <input type="password" placeholder="請輸入密碼">
            </div>
            <div class="signup-hint"></div>
            <button class="login-btn" onclick="signup()">註冊</button>
            <hr>
            <div style="display:flex; align-items: center;justify-content: center; font-weight: bold;">已經有帳號 ?<div style="margin-left:10px;color: #005FB8; cursor: pointer;" class="signupbtn" onclick="showlogin()">點此登入</div></div>
        </div>
    </main>
</body>
<script src="/static/login.js"></script>
</html>
