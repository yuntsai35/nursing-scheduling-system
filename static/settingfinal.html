    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" onclick="main()">首頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-staffmanagement" style="cursor: pointer;" onclick="staff()" >人員管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-setting" onclick="setting()">自動排班</a>
        </li>
        <li class="nav-item">

      <span class="navbar-Text" id="user-menu" style="display:flex; align-items: center;" onclick="memberdropdown()"><span class="material-symbols-outlined">logout</span><span id="username">Username</span></span>
    </div>
  </div>
</nav>
<span class="memberdropdown" style="display:flex; align-items: center; position: relative; cursor: pointer;">
    <div id="user-dropdown" class="user-dropdown-content">
        <a href="/membership">會員設定</a>
        <hr>
        <div onclick="logout()" class="logout-item">登出</div>
    </div>
</span>

  <main>
    <div class="main-container-title">
    <div class="title-group">
          <div class="title">自動排班設定</div>
          <div class="title-explain" style="color: #005fb8;font-size: 18px;">步驟四: 最終資料確認</div>
    </div>
    </div>
    <div class="main-container-top">
      <div class="options">
        <div class="main-title">工時設定</div>
        <div class="date-selector-group" style="display: flex; gap: 10px; align-items: center;">
        <div>兩周內最少休息天數：</div><div id="final-min-rest-2w" class="select" style="width: auto;"></div>
        <div>一個月內最少休息天數：</div><div id="final-min-rest-1m" class="select" style="width: auto;"></div>
        <div>最多連續工作天數：</div><div id="final-max-work" class="select" style="width: auto;"></div>
        <div>每週最多班別種類：</div><div id="final-max-shifts" class="select" style="width: auto;"></div>
        </div>
      </div>
    </div>   

    <div class="main-container-top">
      <div class="options">
        <div class="main-title">選擇的年分及月分</div>
        <div class="date-selector-group" style="display: flex; gap: 10px; align-items: center;">
        <div>年份：</div><div id="final-year" class="select"></div>
        <div>月份：</div><div id="final-month" class="select"></div>
        <span id="final-days-info" style="color: #666; margin-left: 10px;"></span>
        </div>
      </div>
    </div>   

    <div class="main-container-top">
      <div class="options">
        <div class="main-title">本月參與排班人員</div>
        <div class="container-setting">
        </div>
  </div>
  </div>  


    <div class="main-container-top">
      <div class="options">
        <div class="main-title">每班人數及包班人員</div>
        <div style="display: flex; align-items: center; justify-content: center;">
          <div>白班人數：</div><div id="final-day-required" class="select" style="margin-right: 20px;"></div>
          <div>小夜人數：</div><div id="final-night-required" class="select" style="margin-right: 20px;"></div>
          <div>大夜人數：</div><div id="final-midnight-required" class="select"></div>
          </div>
        <div class="container-setting" style="display: flex; align-items: center; justify-content: center; margin-top: 10px;">
        </div>
    <div class="btn-group">
    <button class="btn-group-edit" onclick="lastpage()">回到上一頁</button>
    <button class="btn-group-save" onclick="saveSettingmember()">設定資料確認</button>
    </div>
  </div>
  </div>  
  </main>
