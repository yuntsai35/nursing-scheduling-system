<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/main.css">
    <link rel="stylesheet" href="/static/setting.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#" style="display:flex; align-items: center;"><span class="material-symbols-outlined" style="margin-right: 10px;">blood_pressure</span> 護理人員排班系統</a>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">排班</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#"></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">班別設定</a>
        </li>
      </ul>
      <span class="navbar-Text" style="display:flex; align-items: center;" onclick="logout()"><span class="material-symbols-outlined">logout</span><span id="username">Username</span></span>
    </div>
  </div>
</nav>

    <main>
    <div class="main-container">
        <div class="title">排班需求</div>
        <div class="group">
        <div class="container-setting">
        <div>班次最短間隔時數</div>
        <div>員工在不同班次之間可以工作的最短小時數</div>
        </div>
        <div class="input-container">
            <input type="number" id="min_shift_interval" placeholder="請輸入數字" step="0.1" min="0">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>兩週內最少休息天數</div>
        <div>員工在兩週內必須有的最少休息天數</div>
        </div>
        <div class="input-container">
            <input type="number" id="min_rest_2w" placeholder="請輸入數字" step="0.1" min="0">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>一個月內最少休息天數</div>
        <div>員工在一個月內必須有的最少休息天數</div>
        </div>
        <div class="input-container">
            <input type="number" id="min_rest_1m" placeholder="請輸入數字" step="0.1" min="0">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>每週最多工作時數</div>
        <div>員工每周可以工作的最多小時數</div>
        </div>
        <div class="input-container">
            <input type="number" id="max_hours_1w" placeholder="請輸入數字" step="0.1" min="0">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>每日最多工作時數</div>
        <div>員工每天可以工作的最多小時數</div>
        </div>
        <div class="input-container">
            <input type="number" id="max_hours_1d" placeholder="請輸入數字" step="0.1" min="0">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>最多連續工作天數</div>
        <div>員工在沒有假日的情況下可以連續工作的最多天數</div>
        </div>
        <div class="input-container"> 
            <input type="number" id="max_continuous_work" placeholder="請輸入數字" step="0.1" min="0">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>每週最多班次</div>
        <div>員工每週可以工作的最多班次數</div>
        </div>
        <div class="input-container">
            <input type="number" id="max_shifts_1w" placeholder="請輸入數字" step="0.1" min="0">
        </div>
        </div>
    </div>
    <div class="btn-group">
    <button class="btn-group-save" onclick="saveSettingtime()">前往下一頁設定</button>
    </div>
  </main>
  <script src="/static/setting.js"></script>
</body>
</html>
