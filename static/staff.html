<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="/static/staff.css">
  </head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/index" style="display:flex; align-items: center;"><span class="material-symbols-outlined" style="margin-right: 10px;">blood_pressure</span> 護理人員排班系統</a>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" style="cursor: pointer;" onclick="main()">首頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-staffmanagement" style="cursor: pointer;" onclick="staff()" >人員管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-setting" style="cursor: pointer;" onclick="setting()">自動排班</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" style="cursor: pointer;" onclick="mainreservebreak()">員工班表預假</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" style="cursor: pointer;" onclick="mainfinalscheduling()">員工班表</a>
        </li>
      </ul>
      <span class="navbar-Text" id="user-menu" style="display:flex; align-items: center; cursor: pointer;" onclick="memberdropdown()"><span class="material-symbols-outlined">logout</span><span id="username">Username</span></span>
    </div>
  </div>
</nav>
<span class="memberdropdown" style="display:flex; align-items: center; position: relative; cursor: pointer;">
    <div id="user-dropdown" class="user-dropdown-content">
        <a href="/membership">會員設定</a>
        <hr>
        <div onclick="logout()" class="logout-item">登出</div>
    </div>
</span>
<div id="overlay"></div>
<main>
  <div class="main-container">
    <div class="title" style="display: flex;justify-content: center;">人員管理</div>

    <div class="title-container">
      <button type="button" class="btn btn-danger" id="deleteward-btn" onclick='deleteWard()'>刪除全部群組資料</button>
      <button type="button" class="btn btn-dark" id="addStaff-btn" onclick='openAddPage()'>建立員工檔案</button>
    </div>


    <div class="main-input">
      <div class="main-input-container">
        <div class="main-input-title" id="form-title" style="margin-bottom: 10px;">員工管理新增表單</div>

        <div id="edit-info-group" style="display: none; margin-bottom: 15px; padding: 10px; background: #f8fafc; border-radius: 5px;">
            <div>員工編號：<span id="display-emp-num"></span></div>
            <div>姓名：<span id="display-full-name"></span></div>
            <input type="hidden" id="edit-staff-id"> 
        </div>

        <div class="main-input-group" id="add-select-group" style="margin-bottom: 10px;">
            <div class="main-input-subtitle">選擇新員工:</div>
            <select id="available-staff-choices" class="form-control">
                <option value="">請點選名字</option>
            </select>
        </div>

        <div class="main-input-group" style="margin-bottom: 10px;">
          <div class="main-input-subtitle">職級:</div>
          <select class="addStaff-role" id="addStaff-role">
            <option value="" disabled selected>請選擇職級</option>
            <option value="none">None</option>
            <option value="N0">N0</option>
            <option value="N1">N1</option>
            <option value="N2">N2</option>
            <option value="N3">N3</option>
            <option value="N4">N4</option>
          </select>
        </div>

        <div class="main-input-hint"></div>
        <button type="button" class="btn btn-success" id="submit-insert-btn" onclick="insertstaffinfo()">新增員工檔案</button>
        <button type="button" class="btn btn-primary" id="submit-edit-btn" style="display: none;" onclick="editstaffinfo()">儲存修改</button>
        <button type="button" class="btn btn-danger" onclick="closeAddPage()">關閉</button>
      </div>
    </div>
    
    <table class="table">
      <thead>
        <tr>
          <th>員工編號</th>
          <th>姓名</th>
          <th>職稱</th>
          <th>職級</th>
          <th>病房</th>
          <th id="operation">操作</th>
        </tr>
      </thead>
      <tbody id="staffTableBody">
      </tbody>
    </table>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script src="/static/staff.js"></script>
<script src="/static/navbar.js"></script>
<script src="/static/auth.js"></script>
</body>
</html>
