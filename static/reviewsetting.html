<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/setting.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/index" style="display:flex; align-items: center;"><span class="material-symbols-outlined" style="margin-right: 10px;">blood_pressure</span> 護理人員排班系統</a>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" onclick="main()">首頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-staffmanagement" style="cursor: pointer;" onclick="staff()" >人員管理</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-setting" onclick="setting()">自動排班</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" onclick="mainreservebreak()">員工班表預假</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" onclick="mainfinalscheduling()">員工班表</a>
        </li>
      </ul>
      <span class="navbar-Text" id="user-menu" style="display:flex; align-items: center;" onclick="memberdropdown()"><span class="material-symbols-outlined">logout</span><span id="username">Username</span></span>
    </div>
  </div>
</nav>
<span class="memberdropdown" style="display:flex; align-items: center; position: relative; cursor: pointer;">
    <div id="user-dropdown" class="user-dropdown-content">
        <a href="/membership">會員設定</a>
        <hr>
        <div onclick="logout()" class="logout-item">登出</div>
    </div>
</span>

    <main>
    <div>
        <div class="title">班別人數設定</div>
        <div class="group">
        <div class="container-setting">
        <div>白班</div>
        <div>白班本月需要的員工數</div>
        </div>
        <div class="input-container">
            <input placeholder="請輸入數字">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>小夜</div>
        <div>小夜本月需要的員工數</div>
        </div>
        <div class="input-container">
            <input placeholder="請輸入數字">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>大夜</div>
        <div>大夜本月需要的員工數</div>
        </div>
        <div class="input-container">
            <input placeholder="請輸入數字">
        </div>
        </div>
    </div>
    <div>
        <div class="title">包班需求</div>
        <div class="group">
        <div class="container-setting">
        <div>小夜包班</div>
        </div>
        <div class="input-container">
            <input placeholder="請輸入護理人員的名字">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div>大夜包班</div>
        </div>
        <div class="container">
            <div class="custom-select open">
                <div class="select-box">
                    <input type="text" class="tags-input" name="tags" hidden />
                    <div class="selected-options">
                        <span class="tag">${staff[1]}<span class="remove-tag">&times;</span></span>                        
                    </div>
                    <div class="arrow">
                        <i class="fa fa-angle-down"></i>

                    </div>

                </div>
                <div class="options">
                    <div class="option-search-tags">
                        <input type="text" class="search-tags" placeholder="Search tags..."/>
                        <button type="button" class="clear"><i class="fa fa-close"></i></button>
                    </div>
                    <div class="option all-tags" data-value="All">Select All</div>
                    <div class="option" data-value=""></div>
                </div>

            </div>
        
        </div>
        </div>
    </div>
    <button class="btn-group-edit">回到上一頁</button>
    <button class="btn-group-save">儲存，前往預覽設定</button>
    </main>
<script src="/static/navbar.js"></script>
</body>
</html>
