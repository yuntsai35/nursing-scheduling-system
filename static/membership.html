<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membership</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/membership.css">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/index" style="display:flex; align-items: center;"><span class="material-symbols-outlined" style="margin-right: 10px;">blood_pressure</span> 護理人員排班系統</a>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
      </ul>
      <span class="navbar-Text" id="user-menu" style="display:flex; align-items: center;" onclick="memberdropdown()"><span class="material-symbols-outlined">logout</span><span id="username">Username</span></span>
    </div>
  </div>
</nav>
<span class="memberdropdown" style="display:flex; align-items: center; position: relative; cursor: pointer;">
    <div id="user-dropdown" class="user-dropdown-content">
        <a href="/membership">會員設定</a>
        <hr>
        <div onclick="logout()" class="logout-item">登出</div>
    </div>
</span>

  <main>
    <div class="main">
    <div class="main-container">
      <div class="main-title">會員資料修改</div>
      <div class="info">
          <div class="info-title">會員資料</div>
          <div class="info-item">
              <span>姓名：</span><span id="current-name">載入中...</span>
          </div>
          <div class="info-item">
              <span>帳號 (員工編號):</span><span id="current-employee-num">載入中...</span>
          </div>
      </div>
    <div class="main-mid-container">
      <div class="change-name">
       <div class="update-title">會員姓名修改</div>
       <input class="changename"  type="text" placeholder="請輸入新的姓名" style="margin-bottom:10px;">
       <div id="name-hint"></div>
       </div>
       <div class="change-password">
       <div class="update-title">會員密碼修改</div>
       <div class="title">請輸入舊密碼</div>
       <input class="changeoldpassword" type="password" placeholder="請輸入舊密碼" style="margin-bottom:10px;">
       <div class="title">請輸入新密碼</div>
       <input class="changenewpassword" type="password" placeholder="請輸入新密碼" style="margin-bottom:10px;">
       <div id="password-hint"></div>
       </div>
    </div>
    <div class="btn-container">
    <button onclick="saveMembership()">確認修改</button>
    </div>
  </div>
    </div>
  </main>
<script src="/static/membership.js"></script>
<script src="/static/navbar.js"></script>
</html>
