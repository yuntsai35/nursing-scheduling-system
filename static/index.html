<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
    <title>main</title>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/index" style="display:flex; align-items: center;"><span class="material-symbols-outlined" style="margin-right: 10px;">blood_pressure</span> 護理人員排班系統</a>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
      </ul>
      <span class="navbar-Text" style="display:flex; align-items: center;" onclick="logout()"><span class="material-symbols-outlined">logout</span><span id="username">Username</span></span>
    </div>
  </div>
</nav>

<main>
  <div class="main-container">
        <div class="container-add" id="staffmanagement" onclick="staff(generalstaff)">
            <span class="material-symbols-outlined" id="icon">group_add</span>
            <div>
            <div class="container-bottom-text" id="generalstaff" style="display:flex; align-items: center;font-weight: bold;">建立新護理師排班群組</div>
            <div class="container-bottom-explain">新增一個病房、單位或護理團隊</div>
            </div>
        </div>

        <div class="container-bottom" id="setting" onclick="setting()">
          <span class="material-symbols-outlined" id="icon" >flare</span>
          <div class="container-bottom-text" id="autocalendar" style="display:flex; align-items: center;font-weight: bold;">第二步: 自動排班</div>
          <div  class="container-bottom-explain">工時等客製化設定。點擊後，系統會根據人員職級與預假，自動排出符合設定的班表。</div>
        </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="/static/index.js"></script>
</body>
</html>
