    <meta charset="UTF-8">

<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/main" style="display:flex; align-items: center;"><span class="material-symbols-outlined" style="margin-right: 10px;">blood_pressure</span> 護理人員排班系統</a>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="/main">首頁</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" id="nav-staffmanagement" onclick="staff(generalstaff)" >人員管理</a>

        <li class="nav-item">
          <a class="nav-link" id="nav-setting" href="/setting">自動排班</a>

      <span class="navbar-Text" style="display:flex; align-items: center;" onclick="logout()"><span class="material-symbols-outlined">logout</span><span id="username">Username</span></span>

    <div class="main">
        <div class="main-container">
        <div class="title-group">
          <div class="main-title">自動排班設定</div>
          <div class="title-explain" style="color: #005fb8;font-size: 18px;">步驟三: 班別人數設定</div>
        </div>
        <div class="group-container">
            <div class="title">每班人數設定</div>
        <div class="group">
        <div class="container-setting">
            <div class="container-setting-title" id="白班">白班</div>
            <div>白班本月需要的員工數</div>
        </div>
        <div class="input-container">
            <input type="number" id="required_dayshift" name="required_dayshift" placeholder="請輸入數字">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div class="container-setting-title" id="小夜">小夜</div>
        <div>小夜本月需要的員工數</div>
        </div>
        <div class="input-container">
            <input type="number" id="required_nightshift" name="required_nightshift" placeholder="請輸入數字">
        </div>
        </div>
        <hr>
        <div class="group">
        <div class="container-setting">
        <div class="container-setting-title" id="大夜">大夜</div>
        <div>大夜本月需要的員工數</div>
        </div>
        <div class="input-container">
            <input type="number" id="required_midnightshift" name="required_midnightshift" placeholder="請輸入數字">
        </div>
        </div>
    </div>
    <div class="group-container" style="margin-top: 20px;">
        <div class="title">包班需求</div>
            <div class="container">
                <div class="group">
                    <div class="container-setting">
                        <div>小夜包班</div>
                    </div>
                    <div class="multi-selector-container">
                        <select class="multi-selector" multiple style="display:none;">
                            <option value="Item1">Item1</option>
                            <option value="Item2">Item2</option>
                            <option value="Item3">Item3</option>
                        </select>    
                    </div>
                </div>
                <hr>
                <div class="group">
                    <div class="container-setting">
                        <div>大夜包班</div>
                    </div>
                    <div class="multi-selector-container">
                        <select class="multi-selector-midnight" multiple style="display:none;">
                            <option value="Item1">Item1</option>
                            <option value="Item2">Item2</option>
                            <option value="Item3">Item3</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

    <div class="btn-group">
    <button class="btn-group-edit" onclick="lastpage()">回到上一頁</button>
    <button class="btn-group-save" onclick="saveSettingmember()">儲存設定</button>
    </div>
    </div>
    </div>
    </div>
<script src="/static/setting1.js"></script>
