name: Docker Hub to EC2 CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. 構建並上傳 Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 這裡換成你的 DockerHub 帳號/Image名稱
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nursing-scheduling-system:latest

  # 2. 通知 EC2 更新
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to EC2 and Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            # 停止舊容器並刪除
            docker rm -f my-app || true
            docker rm -f $(docker ps -q --filter "publish=8000") || true
            # 拉取最新 Image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nursing-scheduling-system:latest
            # 啟動新容器
            docker run -d --name my-app -p 8000:80 --env-file /home/ubuntu/nursing-scheduling-system/.env ${{ secrets.DOCKERHUB_USERNAME }}/nursing-scheduling-system:latest
            docker image prune -f
            
